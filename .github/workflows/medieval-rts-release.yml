name: medieval-rts-windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r 2D/medieval_rts/requirements.txt
          pip install pyinstaller

      - name: Build exe (PyInstaller)
        run: |
          python 2D/medieval_rts/scripts/build_windows_exe.py --project 2D/medieval_rts --name MedievalKingdomsRTS --clean

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedievalKingdomsRTS-win64
          path: 2D/medieval_rts/release/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: 2D/medieval_rts/release/*.zip
          generate_release_notes: true
